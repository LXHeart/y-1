<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音视频提取</title>
    <script>
      (function(){var t=localStorage.getItem('theme-preference')||'system';var d=t==='system'?matchMedia('(prefers-color-scheme:light)').matches:t==='light';document.documentElement.setAttribute('data-theme',d?'light':'dark');document.documentElement.style.colorScheme=d?'light':'dark'})()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
